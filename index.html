<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>리즈온 코칭</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f2ee;
    --surface: #ffffff;
    --coach-bubble: #ffffff;
    --user-bubble: #2b2b2b;
    --accent: #b8936a;
    --accent2: #d4a97a;
    --text: #1e1e1e;
    --muted: #999;
    --border: #e8e2da;
    --input-bg: #ffffff;
    --header-bg: #1e1e1e;
    --header-text: #f5f2ee;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    overflow: hidden;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 300;
    display: flex;
    flex-direction: column;
    max-width: 480px;
    margin: 0 auto;
    position: relative;
  }

  /* ── 헤더 ── */
  .header {
    background: var(--header-bg);
    color: var(--header-text);
    padding: 16px 20px 14px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 12px;
    position: relative;
    z-index: 10;
  }

  .coach-avatar {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Noto Serif KR', serif;
    font-size: 16px;
    font-weight: 600;
    color: #fff;
    flex-shrink: 0;
  }

  .header-info { flex: 1; }

  .header-name {
    font-family: 'Noto Serif KR', serif;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: var(--accent2);
  }

  .header-status {
    font-size: 11px;
    color: #888;
    margin-top: 1px;
    letter-spacing: 0.05em;
  }

  .dday-badge {
    background: rgba(184,147,106,0.15);
    border: 1px solid rgba(184,147,106,0.3);
    border-radius: 20px;
    color: var(--accent2);
    font-size: 11px;
    padding: 4px 10px;
    letter-spacing: 0.05em;
    display: none;
  }

  /* ── 온보딩 오버레이 ── */
  .onboarding {
    position: absolute;
    inset: 0;
    background: var(--bg);
    z-index: 20;
    display: flex;
    flex-direction: column;
    padding: 0 24px 40px;
    overflow-y: auto;
  }

  .onboarding-top {
    background: var(--header-bg);
    margin: 0 -24px;
    padding: 48px 24px 32px;
    margin-bottom: 32px;
    text-align: center;
  }

  .ob-logo {
    font-family: 'Noto Serif KR', serif;
    font-size: 30px;
    font-weight: 600;
    color: var(--accent2);
    letter-spacing: 0.08em;
    margin-bottom: 6px;
  }

  .ob-tagline {
    font-size: 12px;
    letter-spacing: 0.25em;
    color: #666;
    text-transform: uppercase;
  }

  .ob-divider {
    width: 32px;
    height: 1px;
    background: var(--accent);
    margin: 14px auto 0;
    opacity: 0.4;
  }

  .ob-desc {
    font-size: 14px;
    color: #555;
    line-height: 1.75;
    text-align: center;
    margin-bottom: 28px;
  }

  .ob-field {
    margin-bottom: 16px;
  }

  .ob-label {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 7px;
    letter-spacing: 0.05em;
    display: block;
  }

  .ob-input, .ob-select, .ob-textarea {
    background: var(--input-bg);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    font-weight: 300;
    outline: none;
    padding: 12px 14px;
    transition: border-color 0.2s;
    width: 100%;
  }

  .ob-input:focus, .ob-select:focus, .ob-textarea:focus {
    border-color: var(--accent);
  }

  .ob-textarea { resize: none; height: 72px; line-height: 1.6; }

  .ob-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .ob-start-btn {
    background: var(--accent);
    border: none;
    border-radius: 12px;
    color: #fff;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.05em;
    margin-top: 8px;
    padding: 16px;
    transition: all 0.2s;
    width: 100%;
  }

  .ob-start-btn:hover { background: var(--accent2); }

  /* ── 채팅 영역 ── */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
  }

  .msg-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    animation: fadeUp 0.25s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg-row.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 600;
    font-family: 'Noto Serif KR', serif;
    color: #fff;
    flex-shrink: 0;
  }

  .msg-avatar.user-av {
    background: var(--user-bubble);
    color: #fff;
    font-size: 11px;
  }

  .bubble {
    max-width: 72%;
    padding: 12px 15px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.75;
    word-break: keep-all;
    position: relative;
  }

  .bubble.coach {
    background: var(--coach-bubble);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    color: var(--text);
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }

  .bubble.user {
    background: var(--user-bubble);
    color: #fff;
    border-bottom-right-radius: 4px;
  }

  .msg-time {
    font-size: 10px;
    color: var(--muted);
    align-self: flex-end;
    margin-bottom: 2px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  /* 타이핑 인디케이터 */
  .typing-row { display: none; }
  .typing-row.visible { display: flex; }

  .typing-dots {
    background: var(--coach-bubble);
    border: 1px solid var(--border);
    border-radius: 16px;
    border-bottom-left-radius: 4px;
    padding: 14px 18px;
    display: flex;
    gap: 5px;
    align-items: center;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }

  .typing-dots span {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: typingBlink 1.2s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typingBlink {
    0%, 80%, 100% { opacity: 0.25; transform: scale(0.85); }
    40% { opacity: 1; transform: scale(1); }
  }

  /* ── 입력창 ── */
  .input-area {
    background: var(--bg);
    border-top: 1px solid var(--border);
    padding: 12px 16px;
    padding-bottom: max(12px, env(safe-area-inset-bottom));
    display: flex;
    gap: 10px;
    align-items: flex-end;
    flex-shrink: 0;
  }

  .input-wrap {
    flex: 1;
    background: var(--input-bg);
    border: 1.5px solid var(--border);
    border-radius: 22px;
    display: flex;
    align-items: flex-end;
    padding: 10px 16px;
    transition: border-color 0.2s;
  }

  .input-wrap:focus-within { border-color: var(--accent); }

  #userInput {
    background: transparent;
    border: none;
    color: var(--text);
    flex: 1;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    font-weight: 300;
    line-height: 1.5;
    max-height: 100px;
    outline: none;
    resize: none;
    overflow-y: auto;
  }

  #userInput::placeholder { color: var(--muted); }

  .send-btn {
    background: var(--accent);
    border: none;
    border-radius: 50%;
    color: #fff;
    cursor: pointer;
    flex-shrink: 0;
    font-size: 18px;
    height: 42px;
    line-height: 1;
    transition: all 0.2s;
    width: 42px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .send-btn:hover { background: var(--accent2); transform: scale(1.05); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* 빠른 질문 칩 */
  .quick-chips {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding: 0 16px 10px;
    scrollbar-width: none;
    flex-shrink: 0;
  }
  .quick-chips::-webkit-scrollbar { display: none; }

  .chip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: #555;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px;
    padding: 7px 14px;
    white-space: nowrap;
    transition: all 0.15s;
    flex-shrink: 0;
  }

  .chip:hover { border-color: var(--accent); color: var(--accent); background: rgba(184,147,106,0.06); }
</style>
</head>
<body>

<!-- 헤더 -->
<div class="header">
  <div class="coach-avatar">리</div>
  <div class="header-info">
    <div class="header-name">리즈온 코치</div>
    <div class="header-status">다이어트 맞춤 코칭</div>
  </div>
  <div class="dday-badge" id="ddayBadge">D-?</div>
</div>

<!-- 온보딩 -->
<div class="onboarding" id="onboarding">
  <div class="onboarding-top">
    <div class="ob-logo">리즈온</div>
    <div class="ob-tagline">다시, 나답게</div>
    <div class="ob-divider"></div>
  </div>

  <div class="ob-desc">코치에게 나를 소개해주세요 😊<br>맞춤 코칭을 시작할게요.</div>

  <div class="ob-field">
    <label class="ob-label">닉네임 *</label>
    <input class="ob-input" id="ob_nickname" placeholder="예: 깡, 뭉툭이" maxlength="10">
  </div>

  <div class="ob-row">
    <div class="ob-field">
      <label class="ob-label">D-day (목표일)</label>
      <input class="ob-input" id="ob_dday" type="date">
    </div>
    <div class="ob-field">
      <label class="ob-label">목표</label>
      <input class="ob-input" id="ob_goal" placeholder="예: -5kg">
    </div>
  </div>

  <div class="ob-field">
    <label class="ob-label">라이프스타일</label>
    <select class="ob-select" id="ob_lifestyle">
      <option value="">선택 안 함</option>
      <option value="직장인 (좌식)">직장인 (좌식)</option>
      <option value="직장인 (활동적)">직장인 (활동적)</option>
      <option value="재택근무">재택근무</option>
      <option value="주부">주부</option>
      <option value="학생">학생</option>
      <option value="자영업">자영업</option>
    </select>
  </div>

  <div class="ob-field">
    <label class="ob-label">운동 루틴</label>
    <input class="ob-input" id="ob_workout" placeholder="예: 크로스핏 주 3회, 없음">
  </div>

  <div class="ob-field">
    <label class="ob-label">주로 먹는 식재료 / 식사 환경</label>
    <textarea class="ob-textarea" id="ob_ingredients" placeholder="예: 닭가슴살, 계란, 현미밥 위주 / 점심은 회사 구내식당"></textarea>
  </div>

  <button class="ob-start-btn" onclick="startChat()">코칭 시작하기 →</button>
</div>

<!-- 채팅 -->
<div class="chat-area" id="chatArea"></div>

<!-- 빠른 질문 칩 -->
<div class="quick-chips" id="quickChips" style="display:none;">
  <div class="chip" onclick="sendChip('오늘 식단 추천해줘')">🍱 오늘 식단</div>
  <div class="chip" onclick="sendChip('운동 전 뭐 먹으면 좋아?')">💪 운동 전 식사</div>
  <div class="chip" onclick="sendChip('야식이 너무 먹고 싶어 ㅠㅠ')">🌙 야식 충동</div>
  <div class="chip" onclick="sendChip('오늘 회식 있는데 어떻게 해?')">🍻 회식 대처법</div>
  <div class="chip" onclick="sendChip('체중이 안 빠지는 것 같아')">📉 정체기</div>
  <div class="chip" onclick="sendChip('단백질 얼마나 먹어야 해?')">🥚 단백질</div>
</div>

<!-- 입력창 -->
<div class="input-area" id="inputArea" style="display:none;">
  <div class="input-wrap">
    <textarea id="userInput" placeholder="질문을 입력하세요..." rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
  </div>
  <button class="send-btn" id="sendBtn" onclick="sendMessage()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="22" y1="2" x2="11" y2="13"></line>
      <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
    </svg>
  </button>
</div>

<script>
  let profile = {};
  let chatHistory = [];
  let isLoading = false;

  function getDaysUntil(dateStr) {
    if (!dateStr) return null;
    const today = new Date(); today.setHours(0,0,0,0);
    const target = new Date(dateStr);
    return Math.ceil((target - today) / 86400000);
  }

  function formatTime() {
    const d = new Date();
    return `${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
  }

  function startChat() {
    const nick = document.getElementById('ob_nickname').value.trim();
    if (!nick) { alert('닉네임을 입력해주세요 😊'); return; }

    profile = {
      nickname: nick,
      dday: document.getElementById('ob_dday').value,
      goal: document.getElementById('ob_goal').value.trim(),
      lifestyle: document.getElementById('ob_lifestyle').value,
      workout: document.getElementById('ob_workout').value.trim(),
      ingredients: document.getElementById('ob_ingredients').value.trim(),
    };

    // D-day 배지
    const days = getDaysUntil(profile.dday);
    if (days !== null) {
      const badge = document.getElementById('ddayBadge');
      badge.style.display = 'block';
      badge.textContent = days >= 0 ? `D-${days}` : `D+${Math.abs(days)}`;
    }

    document.getElementById('onboarding').style.display = 'none';
    document.getElementById('quickChips').style.display = 'flex';
    document.getElementById('inputArea').style.display = 'flex';

    // 웰컴 메시지
    const ddayText = days !== null
      ? (days > 0 ? ` D-day까지 ${days}일 남았어요.` : days === 0 ? ' 오늘이 D-day네요!' : '')
      : '';

    const welcome = `안녕하세요, ${nick}님! 🌿 리즈온 코치예요.\n저는 ${nick}님의 식단, 운동, 다이어트 고민을 함께 풀어드릴게요.${ddayText}\n\n무엇이든 편하게 물어보세요 😊`;
    appendBubble('coach', welcome);
  }

  function appendBubble(role, text, skipHistory=false) {
    const area = document.getElementById('chatArea');
    const row = document.createElement('div');
    row.className = `msg-row ${role === 'user' ? 'user' : ''}`;

    const av = document.createElement('div');
    av.className = `msg-avatar ${role === 'user' ? 'user-av' : ''}`;
    av.textContent = role === 'user' ? (profile.nickname?.[0] || 'U') : '리';

    const bubble = document.createElement('div');
    bubble.className = `bubble ${role}`;
    bubble.style.whiteSpace = 'pre-wrap';
    bubble.textContent = text;

    const time = document.createElement('div');
    time.className = 'msg-time';
    time.textContent = formatTime();

    if (role === 'user') {
      row.append(time, av, bubble); // 순서 조정
      // 실제로는 user: bubble 오른쪽, avatar 오른쪽
      row.innerHTML = '';
      row.append(time, bubble, av);
    } else {
      row.append(av, bubble, time);
    }

    area.appendChild(row);
    area.scrollTop = area.scrollHeight;

    if (!skipHistory) {
      chatHistory.push({ role: role === 'user' ? 'user' : 'assistant', content: text });
    }
  }

  function showTyping() {
    const area = document.getElementById('chatArea');
    const row = document.createElement('div');
    row.className = 'msg-row typing-row visible';
    row.id = 'typingRow';

    const av = document.createElement('div');
    av.className = 'msg-avatar';
    av.textContent = '리';

    const dots = document.createElement('div');
    dots.className = 'typing-dots';
    dots.innerHTML = '<span></span><span></span><span></span>';

    row.append(av, dots);
    area.appendChild(row);
    area.scrollTop = area.scrollHeight;
  }

  function hideTyping() {
    const row = document.getElementById('typingRow');
    if (row) row.remove();
  }

  async function sendMessage(text) {
    const input = document.getElementById('userInput');
    const msg = text || input.value.trim();
    if (!msg || isLoading) return;

    if (!text) { input.value = ''; autoResize(input); }
    appendBubble('user', msg);
    isLoading = true;
    document.getElementById('sendBtn').disabled = true;

    showTyping();

    const days = getDaysUntil(profile.dday);
    const ddayText = days !== null
      ? (days > 0 ? `D-${days} (${days}일 남음)` : days === 0 ? 'D-day 당일' : `D+${Math.abs(days)}`)
      : '미설정';

    const systemPrompt = `당신은 리즈온(LeesOn)의 다이어트 코칭 AI입니다.
슬로건: "다시, 나답게"
페르소나: 크로스핏 코치 출신의 따뜻하고 현실적인 코치. 과도한 칭찬보다 진심 어린 응원. 친근하지만 예의 있는 말투.

참가자 정보:
- 닉네임: ${profile.nickname}
- 목표: ${profile.goal || '미입력'}
- D-day: ${ddayText}
- 라이프스타일: ${profile.lifestyle || '미입력'}
- 운동 루틴: ${profile.workout || '미입력'}
- 보유 식재료/식사 환경: ${profile.ingredients || '미입력'}

규칙:
- 항상 ${profile.nickname}님 호칭 사용
- 이모지 1~3개 자연스럽게 활용
- 식단 제안 시 보유 재료 우선 활용
- 무리한 단식, 극단적 방법 절대 권장 금지
- 유료 구독·결제 유도 발언 금지
- 의학적 진단은 하지 말 것
- 답변은 200자 내외로 간결하게. 목록 제안 시 3~4개로 제한.`;

    try {
      const messages = [
        ...chatHistory.slice(-12), // 최근 6턴
      ];
      // 마지막 user 메시지가 이미 포함되어 있으므로 중복 제거
      if (messages[messages.length-1]?.content === msg && messages[messages.length-1]?.role === 'user') {
        // ok
      } else {
        messages.push({ role: 'user', content: msg });
      }

      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          system: systemPrompt,
          messages: messages
        })
      });

      const data = await res.json();
      hideTyping();

      if (data.content?.[0]?.text) {
        appendBubble('coach', data.content[0].text);
      } else {
        appendBubble('coach', '앗, 잠깐 문제가 생겼어요. 다시 한번 질문해주세요 🙏');
      }
    } catch (e) {
      hideTyping();
      appendBubble('coach', '연결이 불안정해요. 잠시 후 다시 시도해주세요 🙏');
    }

    isLoading = false;
    document.getElementById('sendBtn').disabled = false;
    document.getElementById('userInput').focus();
  }

  function sendChip(text) { sendMessage(text); }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  }
</script>
